<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pokemon</title>
        <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
        />
        <link rel="stylesheet" href="/css/styles.css" />
    </head>

    <body class="bg-light">
      <header>
        <nav class="navbar bg-danger">
          <div class="container">
            <span class="navbar-brand text-white fw-bold"
              >Pokemon busqueda</span
            >
          </div>
        </nav>
      </header>

      <main class="container py-5">
        <section class="card p-4 mb-4 shadow-sm">
          <h5 class="mb-3 fw-bold">Buscar Pokémon</h5>
          <div class="input-group mb-3">
            <input
              type="text"
              class="form-control"
              placeholder="Nombre del pokemon..."
            />
            <button class="btn btn-danger">Buscar Pokemon</button>
          </div>
          <div class="text-center mt-3">
            <img src="" alt="" class="img-fluid mb-2" style="width: 120px" />
            <p class="fw-semibold text-capitalize fs-5">Nombre pokemon</p>
            <button class="btn btn-outline-danger w-100">
              Guardar como favorito
            </button>
          </div>
        </section>

        <section>
          <h5 class="fw-bold mb-3">Mis Favoritos</h5>
          <div class="row g-3">
            <div class="col-6 col-md-3">
              <div class="card text-center p-3 shadow-sm">
                <img src="" alt="" class="mx-auto" style="width: 80px" />
                <p class="mb-0 fw-semibold text-capitalize">Nombre pokemon</p>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="card text-center p-3 shadow-sm">
                <img src="" alt="" class="mx-auto" style="width: 80px" />
                <p class="mb-0 fw-semibold text-capitalize">Nombre pokemon</p>
              </div>
            </div>
          </div>
        </section>
      </main>

      <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
      ></script>

      <script src="/javaScript/app.js"></script>
    </body>
  </html>
</html>
